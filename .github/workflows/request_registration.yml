name: Request Julia Registration

on:
  workflow_dispatch:
    inputs:
      force:
        description: "Trotzdem registrieren, wenn HEAD Workflow-Dateien aendert (TagBot muss dann manuell nachgetaggt werden)"
        type: boolean
        default: false

permissions:
  contents: read
  issues: write

jobs:
  request-registration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # TagBot kann Commits, die .github/workflows/* aendern, nicht mit dem
      # GITHUB_TOKEN taggen (403: Resource not accessible by integration).
      # Deshalb hier abbrechen, bevor Registrator ueberhaupt losrennt.
      - name: Guard - HEAD darf keine Workflow-Dateien aendern
        if: ${{ !inputs.force }}
        run: |
          changed=$(git diff --name-only HEAD^ HEAD -- .github/workflows/)
          if [ -n "$changed" ]; then
            echo "Der zu registrierende Commit aendert Workflow-Dateien:"
            echo "$changed"
            echo "::error::TagBot kann diesen Commit nicht automatisch taggen. Erst einen normalen Commit (z. B. Versions-Bump) pushen und dann registrieren - oder den Workflow mit force=true erneut starten und den Tag anschliessend manuell setzen."
            exit 1
          fi
          echo "OK: HEAD aendert keine Workflow-Dateien."

      - uses: julia-actions/setup-julia@v3
        with:
          version: '1.12'

      - name: Determine unreleased version and prepare issue text
        run: julia .github/scripts/prepare_registration_issue.jl

      - name: Create JuliaRegistrator issue
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const title = fs.readFileSync('release_issue_title.txt', 'utf8').trim();
            const body = fs.readFileSync('release_issue_body.txt', 'utf8');
            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
            });
            core.notice(`Created registration issue #${issue.data.number}: ${issue.data.html_url}`);
            await core.summary
              .addHeading(title)
              .addLink(`Registrierungs-Issue #${issue.data.number}`, issue.data.html_url)
              .addRaw(`\n\nRegistriert wird der Stand von main: \`${context.sha}\``)
              .write();
