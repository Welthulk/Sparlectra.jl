name: Documentation

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Julia
        uses: julia-actions/setup-julia@v2
        with:
          version: "1.12"

      - name: Cache Julia packages
        uses: julia-actions/cache@v2

      - name: Resolve and instantiate docs environment
        run: |
          julia --project=docs -e '
            using Pkg

            registries = Pkg.Registry.reachable_registries()
            has_general = any(reg -> reg.name == "General", registries)

            if !has_general
                Pkg.Registry.add(Pkg.RegistrySpec(
                    name = "General",
                    url = "https://github.com/JuliaRegistries/General.git",
                ))
            end

            Pkg.resolve()
            Pkg.instantiate()
            Pkg.precompile()
          '

      - name: Build documentation
        run: julia --project=docs docs/make.jl

      - name: Copy documentation build to Pages artifact directory
        run: |
          mkdir -p _site
          cp -r docs/build/* _site/

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    runs-on: ubuntu-latest
    needs: build

    environment:
      name: github-pages

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
