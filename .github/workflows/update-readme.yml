name: Update README Version

on:
  push:
    paths:
      - '.julia-version'
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        
      - name: Read Julia version
        id: read-version
        run: echo "julia-version=$(cat .julia-version)" >> $GITHUB_OUTPUT
        
      - name: Setup Julia
        uses: julia-actions/setup-julia@v1
        with:
          version: ${{ steps.read-version.outputs.julia-version }}
          
      - name: Update README
        run: julia --project=. scripts/update_readme_version.jl
        
      - name: Commit changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add README.md
          if ! git diff --staged --quiet; then
            git commit -m "Update Julia version in README"
            git push
          fi